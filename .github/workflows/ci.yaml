name: anaconda-channel-guide tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  # Concurrency group that uses the workflow name and PR number if available
  # or commit SHA as a fallback. If a new build is triggered under that
  # concurrency group while a previous build is running it will be canceled.
  # Repeated pushes to a PR will cancel all previous builds, while multiple
  # merges to main will not cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read  # to check out a private repository

jobs:
  unit-tests:
    name: Test (${{ matrix.runner }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [macos-latest, ubuntu-latest, ubtuntu-24.04-arm, windows-latest]
        python-version: ["310", "311", "312", "313", "314"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    env:
      PIXI_ENV: test-py${{ matrix.python-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: ${{ env.PIXI_ENV }}

      - name: Ensure package is installed
        run: pixi reinstall --environment "${PIXI_ENV}" anaconda-channel-guide

      - name: Run tests
        run: pixi run --environment "${PIXI_ENV}" test

  build-conda:
    name: Build conda package (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [macos-latest, ubuntu-latest, ubtuntu-24.04-arm, windows-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash
    env:
      PIXI_ENV: build
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: ${{ env.PIXI_ENV }}

      - name: Build recipe
        run: pixi run --environment "${PIXI_ENV}" build --channel main
