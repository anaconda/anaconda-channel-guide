package:
  name: anaconda-channel-guide
  {% if GIT_DESCRIBE_TAG is defined and GIT_BUILD_STR is defined %}
  version: {{ GIT_DESCRIBE_TAG }}+{{ GIT_BUILD_STR }}
  {% else %}
  version: 0.0.0dev0
  {% endif %}

source:
  # git_url only captures committed code
  git_url: ../

build:
  number: 0
  noarch: python
  script: python -m pip install . --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
    - pip
  run:
    - python >=3.10
    - conda
    - requests
    - rich
    - anaconda-auth

test:
  requires:
    - pip
    - conda
  imports:
    - anaconda_channel_guide
    - anaconda_channel_guide.plugin
    - anaconda_channel_guide.show
    - anaconda_channel_guide.channel_check
  commands:
    - pip check

about:
  home: https://github.com/your-org/anaconda-channel-guide
  summary: Conda plugin that guides users to main-x channel packages
  license: BSD-3-Clause
